extends:
  - /home/bob/.config/lefthook/lefthook.yml

pre-commit:
  parallel: true
  commands:
    trailing-whitespace:
      run: git diff --cached --check
    dprint-check:
      glob: "*.{md,json,yaml,yml,toml}"
      run: dprint check --allow-no-files {staged_files}
    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}
